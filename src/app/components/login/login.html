<div class="container vh-100 d-flex align-items-center justify-content-center">
  <div class="row justify-content-center w-100">
    <div class="col-10 col-sm-8 col-md-6 col-lg-4">

      <div class="card shadow-sm border-0 px-3 py-4">
        <div class="card-body">

          <div class="text-center mb-4">
            <h3 class="fw-bold text-dark">Welcome Back</h3>
            <p class="text-muted small">Please enter your credentials to sign in</p>
          </div>

          <form (ngSubmit)="onLogin()">
            <div class="mb-3">
              <label for="username" class="form-label text-muted small fw-semibold">Username</label>
              <input type="text" class="form-control" id="username" name="username" autocomplete="true"
                [(ngModel)]="loginData.username" placeholder="Enter your username" required>
            </div>

            <div class="mb-4">
              <label for="password" class="form-label text-muted small fw-semibold">Password</label>
              <input type="password" class="form-control" id="password" name="password" [(ngModel)]="loginData.password"
                placeholder="••••••••" required>
            </div>
            <div class="mb-4">
              <app-text-captcha (captchaValid)="onCaptchaStatusChange($event)"></app-text-captcha>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Login</button>

            <div class="text-center mb-4">
              <p class="text-muted small">New User? <a routerLink="/registration">Register here</a></p>
            </div>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>
