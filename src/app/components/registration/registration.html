<div class="container vh-100 d-flex align-items-center justify-content-center">
  <div class="row justify-content-center w-100">
    <!-- Slightly wider column (col-lg-5) to accommodate side-by-side inputs comfortably -->
    <div class="col-12 col-sm-10 col-md-8 col-lg-5">

      <div class="card shadow-sm border-0 px-3 py-4">
        <div class="card-body">

          <!-- Header -->
          <div class="text-center mb-4">
            <h3 class="fw-bold text-dark">Create Account</h3>
            <p class="text-muted small">Join us today! Enter your details below.</p>
          </div>

          <!-- Error Alert -->
          @if (errorMessage()) {
            <div class="alert alert-danger py-2 px-3 small text-center" role="alert">
              {{ errorMessage() }}
            </div>
          }

          <form (ngSubmit)="onRegister()">
            
            <!-- Row 1: Name and Email side-by-side -->
            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label for="regName" class="form-label text-muted small fw-semibold">Full Name</label>
                <input type="text" class="form-control" id="regName" name="name" 
                  formControlName="name" placeholder="John Doe" required>
              </div>
              <div class="col-md-6">
                <label for="regEmail" class="form-label text-muted small fw-semibold">Email Address</label>
                <input type="email" class="form-control" id="regEmail" name="email" 
                  formControlName="email" placeholder="name@example.com" required>
              </div>
            </div>

            <!-- Row 2: City and Username side-by-side -->
            <div class="row g-3 mb-3">
              <div class="col-md-6">
                <label for="regCity" class="form-label text-muted small fw-semibold">City</label>
                <input type="text" class="form-control" id="regCity" name="city" 
                  formControlName="city" placeholder="New York" required>
              </div>
              <div class="col-md-6">
                <label for="regUsername" class="form-label text-muted small fw-semibold">Username</label>
                <input type="text" class="form-control" id="regUsername" name="username" 
                  formControlName="username" placeholder="johndoe12" required>
              </div>
            </div>

            <!-- Row 3: Password and Confirm Password side-by-side -->
            <div class="row g-3 mb-4">
              <div class="col-md-6">
                <label for="regPassword" class="form-label text-muted small fw-semibold">Password</label>
                <input type="password" class="form-control" id="regPassword" name="password" 
                  formControlName="password" placeholder="••••••••" required>
              </div>
              <div class="col-md-6">
                <label for="confirmPassword" class="form-label text-muted small fw-semibold">Confirm Password</label>
                <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" 
                  formControlName="confirmPassword" placeholder="••••••••" required>
              </div>
            </div>

            <!-- Register Action -->
            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Register</button>

            <hr>

            <!-- Bottom Redirect -->
            <div class="text-center">
              <p class="text-muted small mb-0">Already have an account? <a routerLink="/login">Sign In here</a></p>
            </div>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>
