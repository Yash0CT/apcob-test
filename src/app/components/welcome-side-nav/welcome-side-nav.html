<div class="bg-dark text-white p-3 d-flex flex-column justify-content-between h-100" style="width: 280px; min-width: 280px;">
  <div>
    <div class="d-flex align-items-center mb-4 me-md-auto text-white text-decoration-none border-bottom pb-3">
      <span class="fs-4 fw-bold">Navigation</span>
    </div>

    <ul class="nav nav-pills flex-column mb-auto gap-2">
      @for (item of menuItems; track item.path) {
        <li class="nav-item">
          <a class="nav-link text-white-50 hover-link py-2" 
             [routerLink]="item.path"
             routerLinkActive="active bg-primary text-white"
             [routerLinkActiveOptions]="{ exact: true }">
            {{ item.name }}
          </a>
        </li>
      } @empty {
        <li class="text-muted small ps-3">No menu items provided</li>
      }
    </ul>
  </div>
</div>
