<div class="container vh-100 d-flex align-items-center justify-content-center">
  <div class="row justify-content-center w-100">
    <div class="col-12 col-md-8 text-center">

      @if (authService.currentUserRole() === 'Admin') {
        <div class="card border-danger shadow p-5">
          <div class="card-body">
            <h1 class="display-4 fw-bold text-danger mb-3">Welcome Admin</h1>
            <hr class="my-4">
          </div>
        </div>
      } 
      
      @else if (authService.currentUserRole() === 'user') {
        <div class="card border-primary shadow p-5">
          <div class="card-body">
            <h1 class="display-4 fw-bold text-primary mb-3">Welcome User </h1>
            <hr class="my-4">
          </div>
        </div>
      } 
      
      @else {
        <div class="card border-warning shadow p-5">
          <div class="card-body">
            <h1 class="display-5 fw-bold text-warning mb-3">Access Denied</h1>
            <p class="lead text-muted">You are not authenticated. Please turn back and sign in.</p>
            <a routerLink="/login" class="btn btn-warning px-4 text-white" (click)="authService.logout()">Go to Login</a>
          </div>
        </div>
      }

    </div>
  </div>
</div>
